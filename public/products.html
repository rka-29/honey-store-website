<main class="products-section">

<!-- آراء العملاء -->
<section class="reviews-section">
  <div class="reviews-header">
    <div class="reviews-tag">آراء العملاء</div>
    <h2>تجارب الزبائن</h2>
  </div>
  <div class="reviews-track-wrap">
    <div class="reviews-track" id="reviewsTrack">
      <div class="reviews-loading">جاري التحميل...</div>
    </div>
    <button type="button" class="reviews-arrow reviews-arrow-right" onclick="scrollReviews(-1)">&#8250;</button>
    <button type="button" class="reviews-arrow reviews-arrow-left" onclick="scrollReviews(1)">&#8249;</button>
  </div>
</section>

<script>
function updateCartBadge() {
  try {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const total = cart.reduce(function(sum, item) {
      return sum + (item.qty || 1);
    }, 0);

    const badge = document.getElementById('cartBadge');

    if (!badge) return;

    if (total > 0) {
      badge.textContent = total;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  } catch (e) {}
}

updateCartBadge();
window.addEventListener('storage', updateCartBadge);

const nav = document.getElementById('stickyNav');

if (nav) {
  window.addEventListener('scroll', function() {
    if (window.scrollY > 10) {
      nav.classList.add('nav-scrolled');
    } else {
      nav.classList.remove('nav-scrolled');
    }
  }, { passive: true });
}

function scrollReviews(dir) {
  const track = document.getElementById('reviewsTrack');

  if (!track) return;

  track.scrollBy({
    left: dir * 320,
    behavior: 'smooth'
  });
}
</script>
<script type="module" src="app.js"></script>
